name: 🤖 AI Blog Generator

on:
  workflow_dispatch:  # Manual trigger for testing

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Call Gemini API
        id: gemini
        run: |
          PROMPT="You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2000+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and specific tool recommendations. Return the response in this exact format:
          
          TITLE: [your title here]
          SUMMARY: [your summary here]
          TAGS: [tag1, tag2, tag3]
          KEYWORDS: [keyword1, keyword2]
          
          CONTENT:
          [your full HTML content here]"
          
          echo "🌐 Calling Gemini API..."
          
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              contents: [{parts: [{text: $prompt}]}],
              generationConfig: {temperature: 0.7, maxOutputTokens: 8192},
              tools: [{googleSearch: {}}]
            }')
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ ! -z "$ERROR_MSG" ]; then
            echo "❌ API Error: $ERROR_MSG"
            exit 1
          fi
          
          # Extract text using Python (handles any content safely)
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > /tmp/raw.txt
          
          echo "✅ Text extracted ($(wc -c < /tmp/raw.txt) chars)"
          
          # Parse using Python (reliable for messy text)
          python3 << 'PYEOF'
          import re

          with open('/tmp/raw.txt', 'r') as f:
              text = f.read()

          # Extract sections using regex
          title = re.search(r'TITLE:\s*(.*?)(?=\nSUMMARY:)', text, re.DOTALL)
          summary = re.search(r'SUMMARY:\s*(.*?)(?=\nTAGS:)', text, re.DOTALL)
          tags = re.search(r'TAGS:\s*(.*?)(?=\nKEYWORDS:)', text, re.DOTALL)
          keywords = re.search(r'KEYWORDS:\s*(.*?)(?=\nCONTENT:)', text, re.DOTALL)
          content = re.search(r'CONTENT:\s*(.*)', text, re.DOTALL)

          title = title.group(1).strip() if title else "Untitled"
          summary = summary.group(1).strip() if summary else "No summary"
          tags = tags.group(1).strip() if tags else "Tech 2026"
          keywords = keywords.group(1).strip() if keywords else "Novox Edtech"
          content = content.group(1).strip() if content else text

          # Save to files for GitHub Actions output
          with open('/tmp/title.txt', 'w') as f: f.write(title)
          with open('/tmp/summary.txt', 'w') as f: f.write(summary)
          with open('/tmp/tags.txt', 'w') as f: f.write(tags)
          with open('/tmp/keywords.txt', 'w') as f: f.write(keywords)
          with open('/tmp/content.txt', 'w') as f: f.write(content)

          print(f"✅ Parsed: {title[:60]}...")
          PYEOF
          
          # Save outputs using multiline syntax
          {
            echo "title<<EOF"
            cat /tmp/title.txt
            echo "EOF"
            echo "summary<<EOF"
            cat /tmp/summary.txt
            echo "EOF"
            echo "tags<<EOF"
            cat /tmp/tags.txt
            echo "EOF"
            echo "keywords<<EOF"
            cat /tmp/keywords.txt
            echo "EOF"
            echo "content<<EOF"
            cat /tmp/content.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.gemini.outputs.title }}',
              body: `## Summary\n${{ steps.gemini.outputs.summary }}\n\n---\n\n${{ steps.gemini.outputs.content }}\n\n---\n\n🏷️ Tags: ${{ steps.gemini.outputs.tags }}\n🔑 Keywords: ${{ steps.gemini.outputs.keywords }}\n🤖 Generated by AI | 📅 ${new Date().toISOString()}`
            });
