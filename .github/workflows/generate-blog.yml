name: 🤖 AI Blog Generator

on:
  workflow_dispatch:  # Manual trigger for testing

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Call Gemini API
        id: gemini
        run: |
          # Use a random delimiter that won't appear in content
          DELIM="EOF_$(date +%s)_RANDOM"
          
          PROMPT="You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write an EXTREMELY comprehensive 3000+ word blog post about latest 2026 tech trends. Include extensive salary data, detailed hiring statistics, in-depth tool comparisons, real-world case studies, and actionable career advice. Make it authoritative, detailed, and valuable. Return the response in this exact format:
          
          TITLE: [your title here]
          SUMMARY: [your summary here]
          TAGS: [tag1, tag2, tag3]
          KEYWORDS: [keyword1, keyword2]
          
          CONTENT:
          [your full HTML content here - make it 3000+ words with detailed sections]"
          
          echo "🌐 Calling Gemini API..."
          
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              contents: [{parts: [{text: $prompt}]}],
              generationConfig: {temperature: 0.7, maxOutputTokens: 8192},
              tools: [{googleSearch: {}}]
            }')
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ ! -z "$ERROR_MSG" ]; then
            echo "❌ API Error: $ERROR_MSG"
            exit 1
          fi
          
          # Extract text using Python (handles any content safely)
          echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text' > /tmp/raw.txt
          
          echo "✅ Text extracted ($(wc -c < /tmp/raw.txt) chars)"
          
          # Parse using Python with randomized delimiter
          python3 << PYEOF
          import re
          import uuid

          with open('/tmp/raw.txt', 'r') as f:
              text = f.read()

          # Extract sections using regex
          title = re.search(r'TITLE:\s*(.*?)(?=\nSUMMARY:)', text, re.DOTALL)
          summary = re.search(r'SUMMARY:\s*(.*?)(?=\nTAGS:)', text, re.DOTALL)
          tags = re.search(r'TAGS:\s*(.*?)(?=\nKEYWORDS:)', text, re.DOTALL)
          keywords = re.search(r'KEYWORDS:\s*(.*?)(?=\nCONTENT:)', text, re.DOTALL)
          content = re.search(r'CONTENT:\s*(.*)', text, re.DOTALL)

          title = title.group(1).strip() if title else "Untitled"
          summary = summary.group(1).strip() if summary else "No summary"
          tags = tags.group(1).strip() if tags else "Tech 2026"
          keywords = keywords.group(1).strip() if keywords else "Novox Edtech"
          content = content.group(1).strip() if content else text

          # Generate unique delimiter
          delim = f"DELIMITER_{uuid.uuid4().hex}"

          # Write outputs with unique delimiter for each
          with open('/tmp/outputs.txt', 'w') as f:
              f.write(f"title<<{delim}\n{title}\n{delim}\n")
              f.write(f"summary<<{delim}\n{summary}\n{delim}\n")
              f.write(f"tags<<{delim}\n{tags}\n{delim}\n")
              f.write(f"keywords<<{delim}\n{keywords}\n{delim}\n")
              f.write(f"content<<{delim}\n{content}\n{delim}\n")

          print(f"✅ Parsed: {title[:60]}...")
          print(f"Content length: {len(content)} chars")
          PYEOF
          
          # Read outputs and append to GITHUB_OUTPUT
          cat /tmp/outputs.txt >> $GITHUB_OUTPUT
          
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.gemini.outputs.title }}',
              body: `## Summary\n${{ steps.gemini.outputs.summary }}\n\n---\n\n${{ steps.gemini.outputs.content }}\n\n---\n\n🏷️ Tags: ${{ steps.gemini.outputs.tags }}\n🔑 Keywords: ${{ steps.gemini.outputs.keywords }}\n🤖 Generated by AI | 📅 ${new Date().toISOString()}`
            });
