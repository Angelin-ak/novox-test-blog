name: AI Blog Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Generate Blog
        uses: actions/github-script@v7
        with:
          script: |
            const prompt = `You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2500+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and tool recommendations.

Return ONLY this format:

TITLE: [Your Title]
CATEGORY: [Technology Trends / Career Guidance / Web Development]
SUMMARY: [2-sentence summary]
TAGS: [tag1, tag2, tag3]
KEYWORDS: [keyword1, keyword2, keyword3]

CONTENT:
[Full HTML content using h2, h3, p, ul, li, strong, table, blockquote tags]`;

            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${process.env.GEMINI_API_KEY}`,
              {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }],
                  generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
                  tools: [{ googleSearch: {} }]
                })
              }
            );

            const data = await response.json();
            
            if (data.error) {
              throw new Error(data.error.message);
            }

            const text = data.candidates[0].content.parts[0].text;
            
            // Parse fields
            const titleMatch = text.match(/TITLE:\s*(.+)/);
            const categoryMatch = text.match(/CATEGORY:\s*(.+)/);
            const summaryMatch = text.match(/SUMMARY:\s*(.+)/);
            const tagsMatch = text.match(/TAGS:\s*(.+)/);
            const keywordsMatch = text.match(/KEYWORDS:\s*(.+)/);
            const contentMatch = text.match(/CONTENT:\s*([\s\S]+)/);

            const title = titleMatch ? titleMatch[1].trim() : 'Untitled';
            const category = categoryMatch ? categoryMatch[1].trim() : 'Technology';
            const summary = summaryMatch ? summaryMatch[1].trim() : '';
            const tags = tagsMatch ? tagsMatch[1].trim() : 'Tech 2026';
            const keywords = keywordsMatch ? keywordsMatch[1].trim() : 'Novox Edtech';
            const content = contentMatch ? contentMatch[1].trim() : text;

            // Generate image
            const imagePrompt = encodeURIComponent(title.substring(0, 50));
            const imageUrl = `https://image.pollinations.ai/prompt/${imagePrompt}?width=1200&height=630&nologo=true`;

            // Create issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: `![Blog Thumbnail](${imageUrl})

# ${title}

**Category:** ${category} | **Date:** ${new Date().toLocaleDateString()}

> ${summary}

---

${content}

---

🏷️ **Tags:** ${tags}
🔑 **Keywords:** ${keywords}
🤖 **Generated by Novox AI** | 📅 ${new Date().toISOString()}`,
              labels: ['blog', 'ai-generated', '2026']
            });

            console.log(`✅ Created: ${title}`);
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
