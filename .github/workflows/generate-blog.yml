name: 🤖 AI Blog Generator

on:
  workflow_dispatch:  # Only manual trigger for testing

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Call Gemini API
        id: gemini
        run: |
          PROMPT='You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2000+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and specific tool recommendations. Return ONLY JSON: {"title": "...", "summary": "...", "content": "HTML content", "tags": ["..."], "keywords": ["..."]}'
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{\"parts\": [{\"text\": \"$PROMPT\"}]}],
              \"generationConfig\": {\"temperature\": 0.7, \"maxOutputTokens\": 8192},
              \"tools\": [{\"googleSearch\": {}}]
            }")
          
          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          TEXT=$(echo "$TEXT" | sed 's/```json//g' | sed 's/```//g')
          
          TITLE=$(echo "$TEXT" | jq -r '.title')
          SUMMARY=$(echo "$TEXT" | jq -r '.summary')
          CONTENT=$(echo "$TEXT" | jq -r '.content')
          TAGS=$(echo "$TEXT" | jq -r '.tags | join(", ")')
          KEYWORDS=$(echo "$TEXT" | jq -r '.keywords | join(", ")')
          
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "content=$CONTENT" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "keywords=$KEYWORDS" >> $GITHUB_OUTPUT
          
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.gemini.outputs.title }}',
              body: `## Summary\n${{ steps.gemini.outputs.summary }}\n\n---\n\n${{ steps.gemini.outputs.content }}\n\n---\n\n🏷️ Tags: ${{ steps.gemini.outputs.tags }}\n🔑 Keywords: ${{ steps.gemini.outputs.keywords }}\n🤖 Generated by AI | 📅 ${new Date().toISOString()}`
            });
