name: AI Blog Generator

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Blog
        id: blog
        run: |
          # Build prompt
          cat > /tmp/prompt.txt << 'PROMPT'
You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2500+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and tool recommendations.

Return ONLY this format:

TITLE: [Your Title]
CATEGORY: [Technology Trends / Career Guidance / Web Development]
SUMMARY: [2-sentence summary]
TAGS: [tag1, tag2, tag3]
KEYWORDS: [keyword1, keyword2, keyword3]

CONTENT:
[Full HTML content using h2, h3, p, ul, li, strong, table, blockquote tags]
PROMPT

          # Call Gemini API
          PROMPT_TEXT=$(cat /tmp/prompt.txt)
          
          curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "contents": [{"parts": [{"text": "'"$PROMPT_TEXT"'"}]}],
              "generationConfig": {"temperature": 0.7, "maxOutputTokens": 8192},
              "tools": [{"googleSearch": {}}]
            }' > /tmp/api_response.json

          # Check for API error
          if grep -q '"error"' /tmp/api_response.json; then
            echo "API Error:"
            cat /tmp/api_response.json
            exit 1
          fi

          # Extract text content
          cat /tmp/api_response.json | jq -r '.candidates[0].content.parts[0].text' > /tmp/blog_text.txt
          
          echo "Extracted text:"
          head -c 500 /tmp/blog_text.txt
          echo "..."

      - name: Parse and Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read the generated text
            const text = fs.readFileSync('/tmp/blog_text.txt', 'utf8');
            
            // Simple parsing
            const titleMatch = text.match(/TITLE:\s*(.+)/);
            const categoryMatch = text.match(/CATEGORY:\s*(.+)/);
            const summaryMatch = text.match(/SUMMARY:\s*(.+)/);
            const tagsMatch = text.match(/TAGS:\s*(.+)/);
            const keywordsMatch = text.match(/KEYWORDS:\s*(.+)/);
            const contentMatch = text.match(/CONTENT:\s*([\s\S]+)/);
            
            const title = titleMatch ? titleMatch[1].trim() : 'Untitled Blog Post';
            const category = categoryMatch ? categoryMatch[1].trim() : 'Technology';
            const summary = summaryMatch ? summaryMatch[1].trim() : '';
            const tags = tagsMatch ? tagsMatch[1].trim() : 'Tech 2026';
            const keywords = keywordsMatch ? keywordsMatch[1].trim() : 'Novox Edtech';
            const content = contentMatch ? contentMatch[1].trim() : text;
            
            // Generate image URL
            const imagePrompt = encodeURIComponent(title.substring(0, 50));
            const imageUrl = `https://image.pollinations.ai/prompt/${imagePrompt}?width=1200&height=630&nologo=true`;
            
            // Build issue body
            const body = `![Blog Thumbnail](${imageUrl})

# ${title}

**Category:** ${category} | **Date:** ${new Date().toLocaleDateString()}

> ${summary}

---

${content}

---

🏷️ **Tags:** ${tags}
🔑 **Keywords:** ${keywords}
🤖 **Generated by Novox AI** | 📅 ${new Date().toISOString()}
`;

            // Create issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['blog', 'ai-generated', '2026']
            });
            
            console.log(`Created issue: ${title}`);
