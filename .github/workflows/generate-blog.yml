name: AI Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1,3,5'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Fetch Website Data Dynamically
        id: website
        run: |
          echo "🌐 Fetching website data from Novox Edtech..."
          
          # Fetch pages
          curl -s --max-time 15 https://novoxedtechllp.com/courses > /tmp/courses.html 2>/dev/null || echo "Failed courses"
          curl -s --max-time 15 https://novoxedtechllp.com/about > /tmp/about.html 2>/dev/null || echo "Failed about"
          curl -s --max-time 15 https://novoxedtechllp.com > /tmp/home.html 2>/dev/null || echo "Failed home"
          
          # ============================================
          # EXTRACT COURSES — Simple patterns
          # ============================================
          echo "🔍 Extracting courses..."
          
          # Extract text from h1-h6 tags (remove HTML tags)
          grep -oi '<h[1-6][^>]*>[^<]*' /tmp/courses.html 2>/dev/null | sed 's/<[^>]*>//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > /tmp/extracted_courses.txt
          
          # Extract from title attributes
          grep -oi 'title="[^"]*"' /tmp/courses.html 2>/dev/null | sed 's/title="//;s/"$//' >> /tmp/extracted_courses.txt
          
          # Extract from alt attributes
          grep -oi 'alt="[^"]*"' /tmp/courses.html 2>/dev/null | sed 's/alt="//;s/"$//' >> /tmp/extracted_courses.txt
          
          # Extract from meta description
          grep -oi 'content="[^"]*"' /tmp/courses.html 2>/dev/null | sed 's/content="//;s/"$//' >> /tmp/extracted_courses.txt
          
          # Clean up: remove generic words, keep course-like terms
          cat /tmp/extracted_courses.txt | grep -vi "^courses$\|^home$\|^about$\|^contact$\|^blog$" | sort -u | grep -v "^$" | head -15 > /tmp/courses_clean.txt
          
          echo "📋 Found courses:"
          cat /tmp/courses_clean.txt || echo "No courses found"
          
          # ============================================
          # EXTRACT ABOUT INFO
          # ============================================
          echo "🔍 Extracting about info..."
          
          grep -oi '<h[1-6][^>]*>[^<]*' /tmp/about.html 2>/dev/null | sed 's/<[^>]*>//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > /tmp/extracted_about.txt
          grep -oi '<p[^>]*>[^<]*' /tmp/about.html 2>/dev/null | sed 's/<[^>]*>//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v "^$" | head -5 >> /tmp/extracted_about.txt
          
          cat /tmp/extracted_about.txt | sort -u | grep -v "^$" | head -10 > /tmp/about_clean.txt
          
          echo "📋 Found about info:"
          cat /tmp/about_clean.txt || echo "No about info found"
          
          # ============================================
          # EXTRACT KEYWORDS FROM HOMEPAGE
          # ============================================
          echo "🔍 Extracting homepage keywords..."
          
          grep -oi '<meta[^>]*keywords[^>]*>' /tmp/home.html 2>/dev/null | sed 's/.*content="//;s/".*//' > /tmp/keywords.txt
          grep -oi '<title>[^<]*' /tmp/home.html 2>/dev/null | sed 's/<title>//' >> /tmp/keywords.txt
          
          # ============================================
          # BUILD DYNAMIC TOPIC LIST
          # ============================================
          echo "🏗️ Building dynamic topic list..."
          
          {
            echo "=== COURSES ==="
            cat /tmp/courses_clean.txt
            echo ""
            echo "=== ABOUT ==="
            cat /tmp/about_clean.txt
            echo ""
            echo "=== KEYWORDS ==="
            cat /tmp/keywords.txt
          } > /tmp/website_data.txt
          
          echo "website_data<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/website_data.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "courses<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/courses_clean.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Select Topic from Website Data
        id: topic
        run: |
          COURSES=$(cat /tmp/courses_clean.txt)
          
          echo "🎯 Selecting topic based on website data..."
          
          # Detect courses with simple string matching
          HAS_MERN=$(echo "$COURSES" | grep -ci "mern\|react\|node\|mongo" || echo "0")
          HAS_FLUTTER=$(echo "$COURSES" | grep -ci "flutter\|dart\|mobile" || echo "0")
          HAS_PYTHON=$(echo "$COURSES" | grep -ci "python\|django\|data" || echo "0")
          HAS_UIUX=$(echo "$COURSES" | grep -ci "ui\|ux\|design\|figma" || echo "0")
          HAS_MARKETING=$(echo "$COURSES" | grep -ci "digital\|marketing\|seo\|social" || echo "0")
          
          echo "Detection: MERN=$HAS_MERN, Flutter=$HAS_FLUTTER, Python=$HAS_PYTHON, UI/UX=$HAS_UIUX, Marketing=$HAS_MARKETING"
          
          # Build topic pool
          TOPIC_POOL=()
          
          if [ "$HAS_MERN" -gt 0 ]; then
            TOPIC_POOL+=("mern:TECH:Tech & Programming:MERN Stack Development:Latest trends in MERN Stack, React, Node.js, and MongoDB for full-stack developers")
          fi
          
          if [ "$HAS_FLUTTER" -gt 0 ]; then
            TOPIC_POOL+=("flutter:TECH:Tech & Programming:Flutter Development:Cross-platform mobile development with Flutter, Dart, and responsive design trends")
          fi
          
          if [ "$HAS_PYTHON" -gt 0 ]; then
            TOPIC_POOL+=("python:TECH:Tech & Programming:Python & Data Science:Python programming, data science, machine learning, and AI integration trends")
          fi
          
          if [ "$HAS_UIUX" -gt 0 ]; then
            TOPIC_POOL+=("ui:DESIGN:UI/UX Design:UI/UX Design:Latest UI/UX design trends, Figma, prototyping, and design systems")
            TOPIC_POOL+=("ux:DESIGN:UI/UX Design:User Experience:User research, usability testing, and experience design trends")
          fi
          
          if [ "$HAS_MARKETING" -gt 0 ]; then
            TOPIC_POOL+=("digital:MARKETING:Digital Marketing:Digital Marketing:Digital marketing strategies, SEO, content marketing, and analytics trends")
            TOPIC_POOL+=("seo:MARKETING:Digital Marketing:SEO & Content:Search engine optimization, content strategy, and organic growth trends")
          fi
          
          # Universal topics (always included)
          TOPIC_POOL+=("placement:CAREER:Career & Placement:Placement & Jobs:Job market trends, interview preparation, and placement strategies for Kerala tech graduates")
          TOPIC_POOL+=("career:CAREER:Career & Placement:Career Growth:Career advancement, salary negotiation, and professional development for IT professionals")
          TOPIC_POOL+=("education:EDUCATION:Education & Learning:IT Education:IT education trends, learning methodologies, and skill development in Calicut")
          TOPIC_POOL+=("learning:EDUCATION:Education & Learning:Learning Paths:Effective learning strategies, bootcamp vs degree, and self-paced learning trends")
          
          # Select based on day
          DAY=$(date +%u)
          WEEK_OF_MONTH=$(( ($(date +%d) - 1) / 7 + 1 ))
          
          POOL_SIZE=${#TOPIC_POOL[@]}
          INDEX=$(( (DAY + WEEK_OF_MONTH - 1) % POOL_SIZE ))
          
          SELECTED="${TOPIC_POOL[$INDEX]}"
          
          IFS=: read -r keyword topic category focus_desc <<< "$SELECTED"
          
          echo "✅ Selected: $keyword → $topic → $category"
          echo "📝 Focus: $focus_desc"
          
          echo "topic=$topic" >> $GITHUB_OUTPUT
          echo "category=$category" >> $GITHUB_OUTPUT
          echo "focus=$focus_desc" >> $GITHUB_OUTPUT
          echo "keyword=$keyword" >> $GITHUB_OUTPUT

      - name: Generate Blog
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          retries: 3
          script: |
            const topic = "${{ steps.topic.outputs.topic }}";
            const category = "${{ steps.topic.outputs.category }}";
            const focus = "${{ steps.topic.outputs.focus }}";
            const keyword = "${{ steps.topic.outputs.keyword }}";
            const year = new Date().getFullYear();
            const month = new Date().toLocaleString('en-US', { month: 'long' });
            
            const websiteData = `${{ steps.website.outputs.website_data }}`;
            
            const prompt = "You are a senior content strategist for Novox Edtech LLP, a premier IT training institute in Calicut, Kerala.\n\n" +
              "WEBSITE CONTEXT:\n" +
              "Extracted from Novox website:\n" +
              websiteData + "\n\n" +
              "Based on this content, write a comprehensive blog post (2500+ words) about " + focus + ".\n\n" +
              "TIME: " + month + " " + year + "\n" +
              "AUDIENCE: Aspiring developers, career switchers in Kerala\n\n" +
              "STRUCTURE:\n" +
              "1. HEADLINE: Compelling title\n" +
              "2. INTRODUCTION: Hook with Kerala/India tech statistic\n" +
              "3. MAIN CONTENT (6-8 sections with h2):\n" +
              "   - Specific salary data, hiring numbers\n" +
              "   - HTML comparison tables\n" +
              "   - 2-3 Pro Tips in blockquote\n" +
              "   - 1 Common Mistake warning\n" +
              "4. SALARY TABLE: Kerala IT salaries\n" +
              "5. KEY TAKEAWAYS: 5-7 bullets\n" +
              "6. CONCLUSION: Summary + call to action\n" +
              "7. ABOUT: Novox Edtech as best software training institute in Calicut\n\n" +
              "SEO: Include 'best software training institute in Calicut' 2x, 'IT training in Kozhikode' 1x\n\n" +
              "FORMAT: HTML only (h2, h3, p, ul, li, strong, table, blockquote). NO markdown.\n\n" +
              "OUTPUT:\n" +
              "TITLE: [Title]\n" +
              "CATEGORY: " + category + "\n" +
              "SUMMARY: [2 sentences]\n" +
              "TAGS: [tag1, tag2, tag3]\n" +
              "KEYWORDS: [kw1, kw2, kw3]\n" +
              "IMAGE_PROMPT: [description]\n" +
              "CONTENT:\n" +
              "[HTML]";

            const models = [
              "gemini-2.5-flash",
              "gemini-2.5-flash-lite",
              "gemini-2.5-pro",
              "gemini-2.0-flash",
              "gemini-2.0-flash-lite"
            ];

            let text = null;
            let usedModel = null;

            for (const model of models) {
              try {
                const response = await fetch(
                  "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + process.env.GEMINI_API_KEY,
                  {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
                      tools: [{ googleSearch: {} }]
                    })
                  }
                );

                const data = await response.json();
                
                if (data.error) {
                  console.log("❌ " + model + ": " + data.error.message);
                  if (data.error.code === 429) await new Promise(r => setTimeout(r, 5000));
                  continue;
                }

                text = data.candidates[0].content.parts[0].text;
                usedModel = model;
                console.log("✅ " + model + " succeeded!");
                break;
                
              } catch (e) {
                console.log("❌ " + model + " error: " + e.message);
              }
            }

            if (!text) throw new Error("All models failed");

            // Parse
            let title = "Untitled";
            let blogCategory = category;
            let summary = "";
            let tags = "Tech " + year;
            let keywords = "Novox Edtech";
            let imagePrompt = "technology education";
            let content = text;

            const titleMatch = text.match(/TITLE:\s*(.+?)(?=\nCATEGORY:)/s) || text.match(/TITLE:\s*(.+)/);
            if (titleMatch) title = titleMatch[1].trim();

            const catMatch = text.match(/CATEGORY:\s*(.+?)(?=\nSUMMARY:)/s);
            if (catMatch) blogCategory = catMatch[1].trim();

            const sumMatch = text.match(/SUMMARY:\s*(.+?)(?=\nTAGS:)/s);
            if (sumMatch) summary = sumMatch[1].trim();

            const tagsMatch = text.match(/TAGS:\s*(.+?)(?=\nKEYWORDS:)/s);
            if (tagsMatch) tags = tagsMatch[1].trim();

            const kwMatch = text.match(/KEYWORDS:\s*(.+?)(?=\nIMAGE_PROMPT:)/s);
            if (kwMatch) keywords = kwMatch[1].trim();

            const imgMatch = text.match(/IMAGE_PROMPT:\s*(.+?)(?=\nCONTENT:)/s);
            if (imgMatch) imagePrompt = imgMatch[1].trim();

            const contentMatch = text.match(/CONTENT:\s*([\s\S]+)/);
            if (contentMatch) content = contentMatch[1].trim();

            const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(imagePrompt.substring(0, 50)) + "?width=1200&height=630&nologo=true";

            const body = "![Blog Thumbnail](" + imageUrl + ")\n\n" +
              "# " + title + "\n\n" +
              "**Published by Novoxed Tech LLP** | " + month + " " + year + "\n\n" +
              "> " + summary + "\n\n" +
              "---\n\n" +
              content + "\n\n" +
              "---\n\n" +
              "## Key Takeaways\n\n" +
              "- Stay updated with latest frameworks and tools\n" +
              "- Focus on full-stack capabilities\n" +
              "- Build real-world projects\n" +
              "- Consider certifications from leading institutes\n" +
              "- Network with Kerala tech community\n\n" +
              "---\n\n" +
              "🏷️ **Tags:** " + tags + "\n" +
              "🔑 **Keywords:** " + keywords + "\n" +
              "🤖 **Generated by Novox AI** (" + usedModel + ") | 📅 " + new Date().toISOString() + "\n\n" +
              "**Ready to upskill?** Join the **best software training institute in Calicut** — Novox Edtech LLP.\n\n" +
              "📍 Calicut, Kerala | 🌐 [novoxedtechllp.com](https://novoxedtechllp.com)";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["blog", "ai-generated", String(year), topic.toLowerCase()]
            });

            console.log("✅ Created: " + title);
