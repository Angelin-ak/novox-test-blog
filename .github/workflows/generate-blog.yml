name: AI Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1,3,5'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Determine Topic
        id: topic
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -eq 1 ] || [ "$DAY" -eq 4 ]; then
            echo "topic=TECH" >> $GITHUB_OUTPUT
            echo "category=Tech & Programming" >> $GITHUB_OUTPUT
            echo "focus=Latest technology trends, programming frameworks, AI tools, cloud computing" >> $GITHUB_OUTPUT
          elif [ "$DAY" -eq 2 ] || [ "$DAY" -eq 5 ]; then
            echo "topic=EDUCATION" >> $GITHUB_OUTPUT
            echo "category=Education & Learning" >> $GITHUB_OUTPUT
            echo "focus=IT courses, learning paths, skill development, training methodologies" >> $GITHUB_OUTPUT
          else
            echo "topic=CAREER" >> $GITHUB_OUTPUT
            echo "category=Career & Placement" >> $GITHUB_OUTPUT
            echo "focus=Job market trends, salary insights, hiring criteria, career growth" >> $GITHUB_OUTPUT
          fi

      - name: Generate Blog with Auto-Model Selection
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          retries: 3
          script: |
            const topic = "${{ steps.topic.outputs.topic }}";
            const category = "${{ steps.topic.outputs.category }}";
            const focus = "${{ steps.topic.outputs.focus }}";
            
            const prompt = "You are a senior content strategist for Novox Edtech LLP, a premier IT training institute in Calicut, Kerala. Write a comprehensive, authoritative blog post (2500+ words) about " + focus + " in 2026.\n\n" +
              "STRUCTURE REQUIREMENTS:\n" +
              "1. HEADLINE: Compelling, specific title with year 2026\n" +
              "2. INTRODUCTION (2-3 paragraphs): Hook with real statistic or bold statement about Kerala/India tech scene\n" +
              "3. MAIN CONTENT (6-8 sections, 300-400 words each):\n" +
              "   - Use clear h2 headings for each section\n" +
              "   - Include specific data: salary figures, hiring numbers, market growth\n" +
              "   - Include comparison tables using HTML table tags\n" +
              "   - Include 2-3 Pro Tips in blockquote format\n" +
              "   - Include 1 Common Mistake warning\n" +
              "4. SALARY BENCHMARK TABLE: 2026 Kerala IT salary data in HTML table\n" +
              "5. KEY TAKEAWAYS: 5-7 actionable bullet points\n" +
              "6. CONCLUSION: Summary + call to action for Novox courses\n" +
              "7. ABOUT: Brief mention of Novox Edtech as best software training institute in Calicut\n\n" +
              "SEO REQUIREMENTS:\n" +
              "- Naturally include 'best software training institute in Calicut' 2 times\n" +
              "- Naturally include 'IT training in Kozhikode' 1 time\n" +
              "- Include target keywords in first 100 words\n\n" +
              "FORMATTING:\n" +
              "- Use clean HTML: h2, h3, p, ul, li, strong, table, tr, th, td, blockquote\n" +
              "- NO markdown symbols (#, **, ```)\n" +
              "- NO generic fluff like 'In today's fast-paced world'\n" +
              "- Every paragraph must contain specific data or actionable advice\n\n" +
              "OUTPUT FORMAT (STRICT):\n" +
              "TITLE: [Your Title Here]\n" +
              "CATEGORY: " + category + "\n" +
              "SUMMARY: [Your 2-sentence summary here]\n" +
              "TAGS: [tag1, tag2, tag3]\n" +
              "KEYWORDS: [keyword1, keyword2, keyword3]\n" +
              "IMAGE_PROMPT: [Your image description here]\n" +
              "CONTENT:\n" +
              "[Your full HTML content here]";

            // List of free models to try in order
            const models = [
              "gemini-2.5-flash",        // Best balance, 10 RPM, 250 RPD
              "gemini-2.5-flash-lite",   // Fastest, 15 RPM, 1000 RPD
              "gemini-2.5-pro",          // Best quality, 5 RPM, 100 RPD
              "gemini-2.0-flash",        // Reliable fallback, 10 RPM, 1500 RPD
              "gemini-2.0-flash-lite",   // Cheapest, 15 RPM, 1500 RPD
              "gemini-3-flash-preview",  // Newer features
              "gemini-3.1-flash-lite-preview" // Cost-efficient
            ];

            let text = null;
            let usedModel = null;
            let lastError = null;

            // Try each model until one works
            for (const model of models) {
              console.log("🔄 Trying model: " + model);
              
              try {
                const response = await fetch(
                  "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent?key=" + process.env.GEMINI_API_KEY,
                  {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: prompt }] }],
                      generationConfig: { temperature: 0.7, maxOutputTokens: 8192 },
                      tools: [{ googleSearch: {} }]
                    })
                  }
                );

                const data = await response.json();
                
                if (data.error) {
                  console.log("❌ " + model + " failed: " + data.error.message);
                  lastError = data.error.message;
                  
                  // If quota exceeded, try next model
                  if (data.error.code === 429 || data.error.message.includes("quota") || data.error.message.includes("rate limit")) {
                    console.log("⏳ Quota/rate limit hit, trying next model...");
                    await new Promise(r => setTimeout(r, 3000));
                    continue;
                  }
                  
                  // If model not found, try next
                  if (data.error.code === 404 || data.error.message.includes("not found")) {
                    console.log("❌ Model not available, trying next...");
                    continue;
                  }
                  
                  // Other error, still try next
                  continue;
                }

                // Success!
                text = data.candidates[0].content.parts[0].text;
                usedModel = model;
                console.log("✅ " + model + " succeeded!");
                break;
                
              } catch (e) {
                console.log("❌ " + model + " error: " + e.message);
                lastError = e.message;
                await new Promise(r => setTimeout(r, 2000));
              }
            }

            // If all models failed
            if (!text) {
              throw new Error("All models failed. Last error: " + lastError);
            }

            console.log("📄 Content length: " + text.length);
            console.log("🤖 Model used: " + usedModel);
            console.log("First 300 chars: " + text.substring(0, 300));

            // Parse with multiple fallback patterns
            let title = "Untitled";
            let blogCategory = category;
            let summary = "";
            let tags = "Tech 2026";
            let keywords = "Novox Edtech";
            let imagePrompt = "technology education 2026";
            let content = text;

            // Try multiple title patterns
            const titlePatterns = [
              /TITLE:\s*(.+?)(?=\nCATEGORY:)/s,
              /TITLE:\s*(.+?)(?=\n\n)/,
              /TITLE:\s*(.+)/,
              /^(.+?)(?=\nCATEGORY:)/s
            ];
            
            for (const pattern of titlePatterns) {
              const match = text.match(pattern);
              if (match && match[1].trim() && match[1].trim() !== "Untitled") {
                title = match[1].trim();
                break;
              }
            }

            const catMatch = text.match(/CATEGORY:\s*(.+?)(?=\nSUMMARY:)/s);
            if (catMatch) blogCategory = catMatch[1].trim();

            const sumMatch = text.match(/SUMMARY:\s*(.+?)(?=\nTAGS:)/s);
            if (sumMatch) summary = sumMatch[1].trim();

            const tagsMatch = text.match(/TAGS:\s*(.+?)(?=\nKEYWORDS:)/s);
            if (tagsMatch) tags = tagsMatch[1].trim();

            const kwMatch = text.match(/KEYWORDS:\s*(.+?)(?=\nIMAGE_PROMPT:)/s);
            if (kwMatch) keywords = kwMatch[1].trim();

            const imgMatch = text.match(/IMAGE_PROMPT:\s*(.+?)(?=\nCONTENT:)/s);
            if (imgMatch) imagePrompt = imgMatch[1].trim();

            const contentMatch = text.match(/CONTENT:\s*([\s\S]+)/);
            if (contentMatch) content = contentMatch[1].trim();

            console.log("📝 Parsed title: " + title);
            console.log("🏷️ Category: " + blogCategory);

            // Generate image
            const encodedPrompt = encodeURIComponent(imagePrompt.substring(0, 50));
            const imageUrl = "https://image.pollinations.ai/prompt/" + encodedPrompt + "?width=1200&height=630&nologo=true";

            // Build body
            const body = "![Blog Thumbnail](" + imageUrl + ")\n\n" +
              "# " + title + "\n\n" +
              "**Published by Novoxed Tech LLP** | " + new Date().toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) + "\n\n" +
              "> " + summary + "\n\n" +
              "---\n\n" +
              content + "\n\n" +
              "---\n\n" +
              "## Key Takeaways\n\n" +
              "- Stay updated with latest frameworks and tools\n" +
              "- Focus on full-stack capabilities for better opportunities\n" +
              "- Build real-world projects to showcase skills\n" +
              "- Consider certifications from leading training institutes\n" +
              "- Network with industry professionals in Kerala tech community\n\n" +
              "---\n\n" +
              "🏷️ **Tags:** " + tags + "\n" +
              "🔑 **Keywords:** " + keywords + "\n" +
              "🤖 **Generated by Novox AI** (" + usedModel + ") | 📅 " + new Date().toISOString() + "\n\n" +
              "**Ready to upskill?** Join the **best software training institute in Calicut** and transform your career with hands-on training in MERN Stack, Flutter, Python + React, and more.\n\n" +
              "📍 **Novox Edtech LLP** | Calicut, Kerala\n" +
              "🌐 [novoxedtechllp.com](https://novoxedtechllp.com)";

            // Create issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["blog", "ai-generated", "2026", topic.toLowerCase()]
            });

            console.log("✅ Created: " + title);
            console.log("📂 Topic: " + topic);
            console.log("🏷️ Category: " + blogCategory);
            console.log("🤖 Model used: " + usedModel);
