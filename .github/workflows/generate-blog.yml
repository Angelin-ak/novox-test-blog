name: AI Blog Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1,3,5'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Fetch Website Data
        id: website
        run: |
          echo "🌐 Fetching website data..."
          
          curl -s --max-time 15 https://novoxedtechllp.com/courses > /tmp/courses.html 2>/dev/null || echo "Failed courses"
          curl -s --max-time 15 https://novoxedtechllp.com/about > /tmp/about.html 2>/dev/null || echo "Failed about"
          curl -s --max-time 15 https://novoxedtechllp.com > /tmp/home.html 2>/dev/null || echo "Failed home"
          
          # Extract all text from courses page
          grep -oi '<h[1-6][^>]*>[^<]*' /tmp/courses.html 2>/dev/null | sed 's/<[^>]*>//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > /tmp/extracted.txt
          grep -oi 'title="[^"]*"' /tmp/courses.html 2>/dev/null | sed 's/title="//;s/"$//' >> /tmp/extracted.txt
          grep -oi 'alt="[^"]*"' /tmp/courses.html 2>/dev/null | sed 's/alt="//;s/"$//' >> /tmp/extracted.txt
          
          # Also extract from homepage
          grep -oi '<h[1-6][^>]*>[^<]*' /tmp/home.html 2>/dev/null | sed 's/<[^>]*>//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' >> /tmp/extracted.txt
          
          cat /tmp/extracted.txt | grep -vi "^courses$\|^home$\|^about$\|^contact$\|^blog$\|^novox$\|^edtech$" | sort -u | grep -v "^$" | head -20 > /tmp/courses_clean.txt
          
          echo "📋 All topics found:"
          cat /tmp/courses_clean.txt || echo "None"
          
          {
            echo "=== WEBSITE TOPICS ==="
            cat /tmp/courses_clean.txt
          } > /tmp/website_data.txt
          
          echo "website_data<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/website_data.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Smart Topic Selection
        id: topic
        run: |
          ALL_TOPICS=$(cat /tmp/courses_clean.txt | tr '[:upper:]' '[:lower:]')
          
          echo "🔍 Analyzing website topics..."
          echo "$ALL_TOPICS"
          
          # ============================================
          # DETECT ALL COURSE TYPES
          # ============================================
          
          # TECH courses
          HAS_MERN=$(echo "$ALL_TOPICS" | grep -c "mern\|react\|node\|mongo\|express\|full.stack\|fullstack\|javascript" || echo "0")
          HAS_FLUTTER=$(echo "$ALL_TOPICS" | grep -c "flutter\|dart\|mobile\|android\|ios" || echo "0")
          HAS_PYTHON=$(echo "$ALL_TOPICS" | grep -c "python\|django\|flask\|data.science\|machine.learning\|ai" || echo "0")
          HAS_REACT=$(echo "$ALL_TOPICS" | grep -c "react\|frontend\|next.js\|vue\|angular" || echo "0")
          
          # DESIGN courses
          HAS_UIUX=$(echo "$ALL_TOPICS" | grep -c "ui\|ux\|design\|figma\|adobe\|prototype\|wireframe" || echo "0")
          
          # MARKETING courses
          HAS_MARKETING=$(echo "$ALL_TOPICS" | grep -c "digital\|marketing\|seo\|social.media\|content\|google.ads" || echo "0")
          
          # CAREER services
          HAS_PLACEMENT=$(echo "$ALL_TOPICS" | grep -c "placement\|job\|career\|interview\|hire\|recruitment" || echo "0")
          
          # EDUCATION/OTHER
          HAS_EDUCATION=$(echo "$ALL_TOPICS" | grep -c "education\|training\|course\|learning\|certification" || echo "0")
          
          echo "Detected:"
          echo "  TECH: MERN=$HAS_MERN, Flutter=$HAS_FLUTTER, Python=$HAS_PYTHON, React=$HAS_REACT"
          echo "  DESIGN: UI/UX=$HAS_UIUX"
          echo "  MARKETING: Digital=$HAS_MARKETING"
          echo "  CAREER: Placement=$HAS_PLACEMENT"
          echo "  EDUCATION: Training=$HAS_EDUCATION"
          
          # ============================================
          # BUILD BALANCED TOPIC POOL
          # ============================================
          
          TOPIC_POOL=()
          
          # Add tech topics (limit to avoid over-representation)
          [ "$HAS_MERN" -gt 0 ] && TOPIC_POOL+=("mern:TECH:Tech & Programming:MERN Stack Development:Build scalable web apps with MongoDB, Express, React, Node.js")
          [ "$HAS_FLUTTER" -gt 0 ] && TOPIC_POOL+=("flutter:TECH:Tech & Programming:Flutter Development:Create beautiful cross-platform mobile apps with Flutter and Dart")
          [ "$HAS_PYTHON" -gt 0 ] && TOPIC_POOL+=("python:TECH:Tech & Programming:Python & Data Science:Master Python for data analysis, AI, and backend development")
          [ "$HAS_REACT" -gt 0 ] && TOPIC_POOL+=("react:TECH:Tech & Programming:React & Frontend:Modern frontend development with React, hooks, and state management")
          
          # Add design topics
          [ "$HAS_UIUX" -gt 0 ] && TOPIC_POOL+=("uiux:DESIGN:UI/UX Design:UI/UX Design Principles:Create user-centered designs with Figma, prototyping, and usability testing")
          [ "$HAS_UIUX" -gt 0 ] && TOPIC_POOL+=("figma:DESIGN:UI/UX Design:Figma Mastery:Advanced Figma techniques for professional UI/UX designers")
          
          # Add marketing topics
          [ "$HAS_MARKETING" -gt 0 ] && TOPIC_POOL+=("seo:MARKETING:Digital Marketing:SEO Fundamentals:Rank higher on Google with proven SEO strategies and content optimization")
          [ "$HAS_MARKETING" -gt 0 ] && TOPIC_POOL+=("social:MARKETING:Digital Marketing:Social Media Marketing:Grow brands with Instagram, LinkedIn, and Facebook marketing strategies")
          [ "$HAS_MARKETING" -gt 0 ] && TOPIC_POOL+=("content:MARKETING:Digital Marketing:Content Strategy:Create compelling content that converts visitors into customers")
          
          # Add career topics (always include)
          TOPIC_POOL+=("placement:CAREER:Career & Placement:Placement Preparation:Crack tech interviews with resume building, aptitude, and mock interviews")
          TOPIC_POOL+=("career:CAREER:Career & Placement:Career Growth:Navigate salary negotiations, promotions, and long-term career planning in tech")
          TOPIC_POOL+=("skills:CAREER:Career & Placement:In-Demand Skills:Top skills Kerala employers want in 2026 and how to acquire them")
          
          # Add education topics
          TOPIC_POOL+=("education:EDUCATION:Education & Learning:Learning Pathways:Choose between bootcamps, degrees, and self-learning for IT careers")
          TOPIC_POOL+=("certification:EDUCATION:Education & Learning:Certifications:Which IT certifications actually boost your career in Kerala")
          
          echo "Total topics in pool: ${#TOPIC_POOL[@]}"
          
          # ============================================
          # ROTATE THROUGH ALL TOPICS (not just tech)
          # ============================================
          
          # Use week number to cycle through ALL topics evenly
          WEEK_OF_YEAR=$(date +%V)
          DAY=$(date +%u)
          
          # Calculate index to ensure variety
          INDEX=$(( (WEEK_OF_YEAR * 3 + DAY) % ${#TOPIC_POOL[@]} ))
          
          SELECTED="${TOPIC_POOL[$INDEX]}"
          
          IFS=: read -r keyword topic category focus_desc image_theme <<< "$SELECTED"
          
          # If empty, default to balanced topic
          if [ -z "$topic" ]; then
            keyword="education"
            topic="EDUCATION"
            category="Education & Learning"
            focus_desc="IT Education Trends:Current trends in IT education and skill development in Calicut"
            image_theme="students learning technology in classroom"
          fi
          
          echo "✅ SELECTED TOPIC: $keyword"
          echo "   Category: $category"
          echo "   Focus: $focus_desc"
          echo "   Image theme: $image_theme"
          
          echo "topic=$topic" >> $GITHUB_OUTPUT
          echo "category=$category" >> $GITHUB_OUTPUT
          echo "focus=$focus_desc" >> $GITHUB_OUTPUT
          echo "keyword=$keyword" >> $GITHUB_OUTPUT
          echo "image_theme=$image_theme" >> $GITHUB_OUTPUT

      - name: Generate Blog with Groq
        uses: actions/github-script@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        with:
          script: |
            const topic = "${{ steps.topic.outputs.topic }}";
            const category = "${{ steps.topic.outputs.category }}";
            const focus = "${{ steps.topic.outputs.focus }}";
            const keyword = "${{ steps.topic.outputs.keyword }}";
            const imageTheme = "${{ steps.topic.outputs.image_theme }}";
            const year = new Date().getFullYear();
            const month = new Date().toLocaleString('en-US', { month: 'long' });
            const websiteData = `${{ steps.website.outputs.website_data }}`;
            
            // TOPIC-SPECIFIC PROMPT
            const prompt = "You are a senior content strategist for Novox Edtech LLP, an IT training institute in Calicut, Kerala.\n\n" +
              "WEBSITE DATA:\n" + websiteData + "\n\n" +
              "ASSIGNMENT: Write a detailed blog post (MINIMUM 1575 words) about " + focus + ".\n\n" +
              "TOPIC FOCUS: " + keyword + "\n" +
              "CATEGORY: " + category + "\n" +
              "TIME: " + month + " " + year + "\n\n" +
              "CRITICAL: This blog is about " + keyword + " — NOT generic technology. Focus specifically on " + focus + ".\n\n" +
              "STRUCTURE:\n" +
              "1. HEADLINE: Specific to " + keyword + " (not generic tech)\n" +
              "2. INTRO: Why " + keyword + " matters for Kerala students/professionals\n" +
              "3. MAIN CONTENT (5-6 sections):\n" +
              "   - Industry trends SPECIFIC to " + keyword + "\n" +
              "   - Salary data for " + keyword + " roles in Kerala\n" +
              "   - Tools and skills needed for " + keyword + "\n" +
              "   - Career paths in " + keyword + "\n" +
              "   - 2 Pro Tips specific to " + keyword + "\n" +
              "   - 1 Common Mistake in " + keyword + "\n" +
              "4. SALARY TABLE: Kerala salaries for " + keyword + " roles\n" +
              "5. KEY TAKEAWAYS: 5 actionable points about " + keyword + "\n" +
              "6. CONCLUSION: How Novox helps you master " + keyword + "\n\n" +
              "SEO: Include 'best software training institute in Calicut' 2x, 'IT training in Kozhikode' 1x\n\n" +
              "FORMAT: HTML only (h2, h3, p, ul, li, strong, table, blockquote). NO markdown.\n\n" +
              "OUTPUT FORMAT:\n" +
              "TITLE: [Specific Title About " + keyword + "]\n" +
              "CATEGORY: " + category + "\n" +
              "SUMMARY: [2 sentences about " + keyword + "]\n" +
              "TAGS: [" + keyword + ", " + category.split(' ')[0] + "]\n" +
              "KEYWORDS: [" + keyword + ", Kerala, Calicut]\n" +
              "IMAGE_PROMPT: " + imageTheme + "\n" +
              "CONTENT:\n" +
              "[HTML content about " + keyword + "]";

            console.log("🌐 Calling Groq API...");
            console.log("Topic: " + keyword);
            console.log("Image theme: " + imageTheme);
            
            const response = await fetch(
              "https://api.groq.com/openai/v1/chat/completions",
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + process.env.GROQ_API_KEY
                },
                body: JSON.stringify({
                  model: "llama-3.3-70b-versatile",
                  messages: [
                    { role: "system", content: "You are an expert content writer specializing in " + keyword + ". Write specifically about " + keyword + ", not generic technology." },
                    { role: "user", content: prompt }
                  ],
                  temperature: 0.7,
                  max_tokens: 6000
                })
              }
            );

            const data = await response.json();
            
            if (data.error) {
              throw new Error(data.error.message);
            }

            const text = data.choices[0].message.content;
            console.log("📄 Response length: " + text.length);

            // PARSE FIELDS
            let title = null;
            let blogCategory = category;
            let summary = "";
            let tags = keyword + ", " + year;
            let keywords = keyword + ", Kerala, Calicut";
            let imagePrompt = imageTheme;
            let content = text;

            // Find TITLE
            const titleMatch = text.match(/TITLE:\s*(.+?)(?=\nCATEGORY:)/s) || 
                              text.match(/TITLE:\s*([^\n]+)/);
            if (titleMatch && titleMatch[1].trim().length > 5) {
              title = titleMatch[1].trim();
            }

            // Fallback: first line if looks like title
            if (!title) {
              const firstLine = text.split('\n')[0].trim();
              if (firstLine.length > 10 && firstLine.length < 150) {
                title = firstLine;
              }
            }

            // Final fallback
            if (!title || title === "Untitled" || title.length < 5) {
              title = "Master " + keyword + ": Complete Guide for " + year;
            }

            // Parse other fields
            const catMatch = text.match(/CATEGORY:\s*([^\n]+)/);
            if (catMatch) blogCategory = catMatch[1].trim();

            const sumMatch = text.match(/SUMMARY:\s*(.+?)(?=\nTAGS:)/s) || text.match(/SUMMARY:\s*([^\n]+)/);
            if (sumMatch) summary = sumMatch[1].trim();

            const tagsMatch = text.match(/TAGS:\s*([^\n]+)/);
            if (tagsMatch) tags = tagsMatch[1].trim();

            const kwMatch = text.match(/KEYWORDS:\s*([^\n]+)/);
            if (kwMatch) keywords = kwMatch[1].trim();

            const imgMatch = text.match(/IMAGE_PROMPT:\s*([^\n]+)/);
            if (imgMatch && imgMatch[1].trim().length > 5) {
              imagePrompt = imgMatch[1].trim();
            }

            const contentMatch = text.match(/CONTENT:\s*([\s\S]+)/);
            if (contentMatch) content = contentMatch[1].trim();

            console.log("📝 Title: " + title);
            console.log("🖼️ Image prompt: " + imagePrompt);

            // Generate MATCHING image
            const encodedPrompt = encodeURIComponent(imagePrompt.substring(0, 100));
            const imageUrl = "https://image.pollinations.ai/prompt/" + encodedPrompt + "?width=1200&height=630&nologo=true";

            // Build body
            const body = "![Blog Thumbnail](" + imageUrl + ")\n\n" +
              "# " + title + "\n\n" +
              "**Published by Novoxed Tech LLP** | " + month + " " + year + "\n\n" +
              "> " + summary + "\n\n" +
              "---\n\n" +
              content + "\n\n" +
              "---\n\n" +
              "## Key Takeaways\n\n" +
              "- Master " + keyword + " with hands-on practice\n" +
              "- Stay updated with latest " + keyword + " trends\n" +
              "- Build real-world " + keyword + " projects\n" +
              "- Get certified from leading institutes\n" +
              "- Network with Kerala " + keyword + " community\n\n" +
              "---\n\n" +
              "🏷️ **Tags:** " + tags + "\n" +
              "🔑 **Keywords:** " + keywords + "\n" +
              "🤖 **Generated by Novox AI** | 📅 " + new Date().toISOString() + "\n\n" +
              "**Ready to master " + keyword + "?** Join the **best software training institute in Calicut** — Novox Edtech LLP.\n\n" +
              "📍 Calicut, Kerala | 🌐 [novoxedtechllp.com](https://novoxedtechllp.com)";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["blog", "ai-generated", String(year), keyword.toLowerCase()]
            });

            console.log("✅ SUCCESS: " + title);
            console.log("🏷️ Category: " + blogCategory);
            console.log("🎯 Topic: " + keyword);
            console.log("🖼️ Image: " + imagePrompt);
