name: 🤖 AI Blog Generator

on:
  workflow_dispatch:  # Manual trigger for testing

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Call Gemini API
        id: gemini
        run: |
          PROMPT="You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2000+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and specific tool recommendations. Return ONLY JSON with fields: title, summary, content, tags, keywords"
          
          echo "🌐 Calling Gemini API..."
          
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              contents: [{parts: [{text: $prompt}]}],
              generationConfig: {temperature: 0.7, maxOutputTokens: 8192},
              tools: [{googleSearch: {}}]
            }')
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ ! -z "$ERROR_MSG" ]; then
            echo "❌ API Error: $ERROR_MSG"
            exit 1
          fi
          
          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$TEXT" ] || [ "$TEXT" = "null" ]; then
            echo "❌ ERROR: No text content"
            exit 1
          fi
          
          echo "✅ Text extracted (${#TEXT} chars)"
          
          # Save raw text to file for debugging
          echo "$TEXT" > /tmp/raw_response.txt
          
          # Clean markdown fences
          TEXT=$(echo "$TEXT" | sed 's/```json//g' | sed 's/```//g')
          
          # Try to parse with jq, if fails show error
          if ! echo "$TEXT" | jq . > /tmp/parsed.json 2>/tmp/jq_error.txt; then
            echo "❌ jq parse failed:"
            cat /tmp/jq_error.txt
            echo "First 500 chars of text:"
            head -c 500 /tmp/raw_response.txt
            exit 1
          fi
          
          echo "✅ JSON validated"
          
          # Extract fields safely
          TITLE=$(jq -r '.title // "Untitled"' /tmp/parsed.json)
          SUMMARY=$(jq -r '.summary // "No summary"' /tmp/parsed.json)
          TAGS=$(jq -r '.tags // [] | join(", ")' /tmp/parsed.json)
          KEYWORDS=$(jq -r '.keywords // [] | join(", ")' /tmp/parsed.json)
          
          # Save simple fields
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "keywords=$KEYWORDS" >> $GITHUB_OUTPUT
          
          # Save content using file-based approach (most reliable)
          jq -r '.content // "No content"' /tmp/parsed.json > /tmp/content.txt
          {
            echo "content<<EOF"
            cat /tmp/content.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT
          
          echo "✅ Parsed: $TITLE"
          
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.gemini.outputs.title }}',
              body: `## Summary\n${{ steps.gemini.outputs.summary }}\n\n---\n\n${{ steps.gemini.outputs.content }}\n\n---\n\n🏷️ Tags: ${{ steps.gemini.outputs.tags }}\n🔑 Keywords: ${{ steps.gemini.outputs.keywords }}\n🤖 Generated by AI | 📅 ${new Date().toISOString()}`
            });
            
