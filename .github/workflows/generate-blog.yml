name: ­¤ż¢ AI Blog Generator

on:
  workflow_dispatch:  # Manual trigger for testing

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    
    steps:
      - name: Debug API Key
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "ŌØī ERROR: GEMINI_API_KEY is not set!"
            exit 1
          else
            echo "Ō£ģ API Key is set (length: ${#${{ secrets.GEMINI_API_KEY }}})"
          fi

      - name: Call Gemini API
        id: gemini
        run: |
          PROMPT='You are a senior tech advisor for Novox Edtech LLP in Calicut, Kerala. Write a comprehensive 2000+ word blog post about latest 2026 tech trends. Include salary data, hiring statistics, and specific tool recommendations. Return ONLY JSON: {"title": "...", "summary": "...", "content": "HTML content", "tags": ["..."], "keywords": ["..."]}'
          
          echo "­¤īÉ Calling Gemini API..."
          
          RESPONSE=$(curl -s -X POST \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"contents\": [{\"parts\": [{\"text\": \"$PROMPT\"}]}],
              \"generationConfig\": {\"temperature\": 0.7, \"maxOutputTokens\": 8192},
              \"tools\": [{\"googleSearch\": {}}]
            }")
          
          echo "­¤ō” Raw Response:"
          echo "$RESPONSE"
          
          # Check if response has error
          ERROR_MSG=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ ! -z "$ERROR_MSG" ]; then
            echo "ŌØī API Error: $ERROR_MSG"
            exit 1
          fi
          
          # Extract text
          TEXT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // empty')
          
          if [ -z "$TEXT" ] || [ "$TEXT" = "null" ]; then
            echo "ŌØī ERROR: No text content in response"
            echo "Full response:"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          
          echo "Ō£ģ Text extracted successfully"
          echo "TEXT length: ${#TEXT}"
          
          # Clean markdown fences
          TEXT=$(echo "$TEXT" | sed 's/```json//g' | sed 's/```//g')
          
          # Validate JSON
          echo "$TEXT" | jq . > /dev/null 2>&1
          if [ $? -ne 0 ]; then
            echo "ŌØī ERROR: Response is not valid JSON"
            echo "Raw text:"
            echo "$TEXT"
            exit 1
          fi
          
          # Parse fields
          TITLE=$(echo "$TEXT" | jq -r '.title // "Untitled"')
          SUMMARY=$(echo "$TEXT" | jq -r '.summary // "No summary"')
          CONTENT=$(echo "$TEXT" | jq -r '.content // "No content"')
          TAGS=$(echo "$TEXT" | jq -r '.tags // [] | join(", ")')
          KEYWORDS=$(echo "$TEXT" | jq -r '.keywords // [] | join(", ")')
          
          echo "Ō£ģ Parsed successfully:"
          echo "Title: $TITLE"
          echo "Summary: $SUMMARY"
          echo "Tags: $TAGS"
          
          # Save outputs
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "summary=$SUMMARY" >> $GITHUB_OUTPUT
          echo "content=$CONTENT" >> $GITHUB_OUTPUT
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "keywords=$KEYWORDS" >> $GITHUB_OUTPUT
          
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '${{ steps.gemini.outputs.title }}',
              body: `## Summary\n${{ steps.gemini.outputs.summary }}\n\n---\n\n${{ steps.gemini.outputs.content }}\n\n---\n\n­¤ÅĘ’ĖÅ Tags: ${{ steps.gemini.outputs.tags }}\n­¤öæ Keywords: ${{ steps.gemini.outputs.keywords }}\n­¤ż¢ Generated by AI | ­¤ōģ ${new Date().toISOString()}`
            });
