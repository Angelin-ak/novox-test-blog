<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novox Blogs | Latest Tech Insights 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #e74c3c;
            background: #fdf2f2;
            border-radius: 8px;
            margin: 20px 0;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            padding: 40px 0;
        }

        .blog-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .blog-card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .blog-category {
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .blog-card-header h2 {
            font-size: 1.3em;
            line-height: 1.3;
        }

        .blog-card-body {
            padding: 20px;
        }

        .blog-summary {
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .blog-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.85em;
            color: #999;
        }

        .blog-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .tag {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #666;
        }

        .read-more {
            display: inline-block;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        /* Full blog view modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-content {
            background: white;
            max-width: 800px;
            margin: 50px auto;
            padding: 40px;
            border-radius: 12px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-body h2 {
            color: #667eea;
            margin: 30px 0 15px;
        }

        .modal-body p {
            margin-bottom: 15px;
        }

        .modal-body ul, .modal-body ol {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .modal-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 20px 0;
            color: #555;
            font-style: italic;
        }

        .modal-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .modal-body th, .modal-body td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .modal-body th {
            background: #f5f5f5;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <h1>Novox Edtech Blog</h1>
            <p>Latest Insights on Tech Trends, Career Guidance & Industry Updates</p>
        </div>
    </header>

    <div class="container">
        <div id="blog-list" class="loading">Loading blogs from GitHub</div>
    </div>

    <!-- Modal for full blog view -->
    <div id="blog-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <footer>
        <p> Powered by Novox AI | Generated with Gemini 2.5 Flash</p>
    </footer>

    <script>
        // CONFIGURATION - Change this to your repo
        const GITHUB_USER = 'Angelin-ak';  // <-- CHANGE THIS
        const GITHUB_REPO = 'novox-test-blog';        // <-- CHANGE THIS (or your real repo)
        
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?state=open`;

        // Fetch blogs from GitHub Issues
        async function fetchBlogs() {
            const container = document.getElementById('blog-list');
            
            try {
                const response = await fetch(API_URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const issues = await response.json();
                
                if (issues.length === 0) {
                    container.innerHTML = '<div class="error">No blogs found. Run the workflow first!</div>';
                    return;
                }

                // Sort by newest first
                issues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                // Render blog cards
                container.className = 'blog-grid';
                container.innerHTML = issues.map(issue => {
                    const parsed = parseIssueBody(issue.body);
                    
                    return `
                        <div class="blog-card" onclick="openBlog(${issue.number})">
                            <div class="blog-card-header">
                                <span class="blog-category">${parsed.category || 'Tech Insights'}</span>
                                <h2>${issue.title}</h2>
                            </div>
                            <div class="blog-card-body">
                                <p class="blog-summary">${parsed.summary.substring(0, 150)}...</p>
                                <div class="blog-tags">
                                    ${parsed.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                </div>
                                <div class="blog-meta">
                                    <span>${new Date(issue.created_at).toLocaleDateString()}</span>
                                    <span>${parsed.wordCount || ''} words</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                // Store issues for modal view
                window.blogIssues = issues;

            } catch (error) {
                container.innerHTML = `<div class="error">Error loading blogs: ${error.message}</div>`;
                console.error('Fetch error:', error);
            }
        }

        // Parse issue body into sections
        function parseIssueBody(body) {
            if (!body) return { summary: '', content: '', tags: [], keywords: [], category: 'Tech' };
            
            const parts = body.split('---');
            
            // Extract summary from first part
            const summaryMatch = parts[0].match(/SUMMARY:\s*(.+)/s);
            const summary = summaryMatch ? summaryMatch[1].trim() : parts[0].substring(0, 200);
            
            // Extract content from middle part
            const content = parts[1] || '';
            
            // Extract metadata from last part
            const metaPart = parts[2] || '';
            const tagsMatch = metaPart.match(/🏷️ Tags:\s*(.+)/);
            const keywordsMatch = metaPart.match(/🔑 Keywords:\s*(.+)/);
            
            const tags = tagsMatch ? tagsMatch[1].split(',').map(t => t.trim()) : ['Tech 2026'];
            const keywords = keywordsMatch ? keywordsMatch[1].split(',').map(k => k.trim()) : [];
            
            // Estimate word count
            const wordCount = content.split(/\s+/).length;
            
            // Determine category from labels or content
            const category = body.includes('agency') ? 'Agency' : 
                           body.includes('education') ? 'Education' : 'Tech Insights';
            
            return { summary, content, tags, keywords, category, wordCount };
        }

        // Open full blog in modal
        function openBlog(issueNumber) {
            const issue = window.blogIssues.find(i => i.number === issueNumber);
            if (!issue) return;
            
            const parsed = parseIssueBody(issue.body);
            const modal = document.getElementById('blog-modal');
            const modalBody = document.getElementById('modal-body');
            
            modalBody.innerHTML = `
                <h1>${issue.title}</h1>
                <time style="color: #999;">${new Date(issue.created_at).toLocaleDateString()}</time>
                <div style="margin-top: 30px;">
                    ${parsed.content}
                </div>
                <div style="margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee;">
                    <p><strong>Tags:</strong> ${parsed.tags.join(', ')}</p>
                    <p><strong>Keywords:</strong> ${parsed.keywords.join(', ')}</p>
                </div>
            `;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // Close modal
        function closeModal() {
            document.getElementById('blog-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close modal on outside click
        document.getElementById('blog-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // Load blogs when page loads
        fetchBlogs();
    </script>

</body>
</html>
