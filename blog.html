<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novox Edtech | Blog</title>
    <style>
        /* Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Typography */
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            background: #fafafa;
        }
        
        /* Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Header */
        .site-header {
            background: #1a1a2e;
            color: white;
            padding: 40px 0;
            text-align: center;
            border-bottom: 4px solid #e94560;
        }
        
        .site-header h1 {
            font-family: 'Arial', sans-serif;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .site-header p {
            font-family: 'Arial', sans-serif;
            font-size: 0.95em;
            opacity: 0.8;
            margin-top: 10px;
        }
        
        /* Blog List */
        .blog-list {
            padding: 60px 0;
        }
        
        .blog-item {
            background: white;
            border: 1px solid #e0e0e0;
            margin-bottom: 40px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            cursor: pointer;
        }
        
        .blog-item:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        
        .blog-meta {
            font-family: 'Arial', sans-serif;
            font-size: 0.85em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .blog-item h2 {
            font-family: 'Arial', sans-serif;
            font-size: 1.8em;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 15px;
            line-height: 1.3;
        }
        
        .blog-excerpt {
            color: #555;
            margin-bottom: 20px;
        }
        
        .blog-footer {
            font-family: 'Arial', sans-serif;
            font-size: 0.85em;
            color: #888;
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 20px;
        }
        
        .read-more {
            color: #e94560;
            font-weight: 600;
            text-decoration: none;
        }
        
        /* Full Article View (hidden by default) */
        .article-view {
            display: none;
            background: white;
            padding: 60px 0;
            min-height: 100vh;
        }
        
        .article-view.active {
            display: block;
        }
        
        .article-header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid #1a1a2e;
        }
        
        .article-header h1 {
            font-family: 'Arial', sans-serif;
            font-size: 2.5em;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .article-meta {
            font-family: 'Arial', sans-serif;
            font-size: 0.9em;
            color: #888;
        }
        
        .article-content {
            font-size: 1.05em;
        }
        
        .article-content h2 {
            font-family: 'Arial', sans-serif;
            font-size: 1.6em;
            font-weight: 700;
            color: #1a1a2e;
            margin: 40px 0 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e94560;
        }
        
        .article-content h3 {
            font-family: 'Arial', sans-serif;
            font-size: 1.3em;
            font-weight: 600;
            color: #333;
            margin: 30px 0 15px;
        }
        
        .article-content p {
            margin-bottom: 20px;
        }
        
        .article-content blockquote {
            border-left: 4px solid #e94560;
            padding: 20px 30px;
            margin: 30px 0;
            background: #f8f9fa;
            font-style: italic;
            color: #555;
        }
        
        .article-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 30px 0;
            font-size: 0.95em;
        }
        
        .article-content th {
            background: #1a1a2e;
            color: white;
            padding: 15px;
            text-align: left;
            font-family: 'Arial', sans-serif;
            font-weight: 600;
        }
        
        .article-content td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .article-content tr:hover {
            background: #f8f9fa;
        }
        
        .article-content ul, .article-content ol {
            margin: 20px 0 20px 30px;
        }
        
        .article-content li {
            margin-bottom: 10px;
        }
        
        .article-content strong {
            color: #1a1a2e;
        }
        
        .article-image {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            margin: 30px 0;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: #e94560;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-weight: 600;
            cursor: pointer;
        }
        
        .article-meta-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-family: 'Arial', sans-serif;
            font-size: 0.9em;
            color: #888;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 80px 20px;
            color: #888;
        }
        
        /* Error */
        .error {
            text-align: center;
            padding: 40px;
            color: #e94560;
            background: #fdf2f2;
            border: 1px solid #fcc;
        }
        
        /* Footer */
        .site-footer {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 40px 0;
            font-family: 'Arial', sans-serif;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <h1>Novox Edtech</h1>
            <p>Professional IT Training Institute | Calicut, Kerala</p>
        </div>
    </header>

    <!-- Blog List View -->
    <main id="list-view" class="blog-list">
        <div class="container">
            <div id="blogs-container" class="loading">Loading articles...</div>
        </div>
    </main>

    <!-- Full Article View (hidden by default) -->
    <main id="article-view" class="article-view">
        <div class="container">
            <div id="article-container"></div>
            <span class="back-link" onclick="showList()">← Back to All Articles</span>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p> 2026 Novox Edtech LLP. All rights reserved.</p>
            <p>Best Software Training Institute in Calicut</p>
        </div>
    </footer>

    <script>
        const GITHUB_USER = 'Angelin-ak';
        const GITHUB_REPO = 'novox-test-blog';
        const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/issues?state=open&labels=blog`;

        let allIssues = [];

        // Load blog list
        async function loadBlogs() {
            const container = document.getElementById('blogs-container');
            
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const issues = await response.json();
                allIssues = issues;
                
                if (issues.length === 0) {
                    container.innerHTML = '<div class="error">No articles published yet.</div>';
                    return;
                }

                issues.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                container.className = 'blog-list';
                container.innerHTML = issues.map(issue => {
                    const body = issue.body || '';
                    const summaryMatch = body.match(/>\s*(.+?)(?=\n\n)/s);
                    const summary = summaryMatch ? summaryMatch[1] : 'Click to read full article...';
                    const catMatch = body.match(/\*\*Category:\*\*\s*(.+?)\s*\|/);
                    const category = catMatch ? catMatch[1].trim() : 'Technology';
                    const date = new Date(issue.created_at).toLocaleDateString('en-US', {
                        year: 'numeric', month: 'long', day: 'numeric'
                    });
                    
                    return `
                        <article class="blog-item" onclick="showArticle(${issue.number})">
                            <div class="blog-meta">${category} | ${date}</div>
                            <h2>${issue.title}</h2>
                            <p class="blog-excerpt">${summary}</p>
                            <div class="blog-footer">
                                <span>Issue #${issue.number}</span>
                                <span class="read-more">Read Full Article →</span>
                            </div>
                        </article>
                    `;
                }).join('');

            } catch (error) {
                container.innerHTML = `<div class="error">Failed to load articles: ${error.message}</div>`;
            }
        }

        // Show full article
        function showArticle(issueNumber) {
            const issue = allIssues.find(i => i.number === issueNumber);
            if (!issue) return;

            const body = issue.body || '';
            
            // Extract image
            const imgMatch = body.match(/!\[Blog Thumbnail\]\((.+?)\)/);
            const imageUrl = imgMatch ? imgMatch[1] : '';
            
            // Extract content (remove image and meta)
            let content = body.replace(/!\[Blog Thumbnail\]\(.+?\)\n\n/, '');
            content = content.replace(/---\n\n## 🏷️ Tags[\s\S]*$/, '');
            
            // Extract meta
            const metaMatch = body.match(/## 🏷️ Tags[\s\S]*$/);
            const meta = metaMatch ? metaMatch[0] : '';
            
            // Extract category and date
            const catMatch = body.match(/\*\*Category:\*\*\s*(.+?)\s*\|/);
            const category = catMatch ? catMatch[1].trim() : 'Technology';
            const date = new Date(issue.created_at).toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            document.getElementById('article-container').innerHTML = `
                <div class="article-header">
                    <div class="article-meta">${category} | ${date} | Issue #${issue.number}</div>
                    <h1>${issue.title}</h1>
                </div>
                ${imageUrl ? `<img class="article-image" src="${imageUrl}" alt="${issue.title}">` : ''}
                <div class="article-content">
                    ${content}
                </div>
                <div class="article-meta-footer">
                    ${meta}
                </div>
            `;

            // Hide list, show article
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('article-view').classList.add('active');
            window.scrollTo(0, 0);
        }

        // Show list view
        function showList() {
            document.getElementById('article-view').classList.remove('active');
            document.getElementById('list-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        // Load on page load
        loadBlogs();
    </script>

</body>
</html>
